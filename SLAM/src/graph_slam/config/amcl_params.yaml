amcl:
  ros__parameters:
    use_sim_time: false

    # Frames
    global_frame_id:  map
    odom_frame_id:    odom
    base_frame_id:    base_link

    # Motion model — LIMO is differential drive
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.2      # rot noise from rot
    alpha2: 0.2      # rot noise from trans
    alpha3: 0.1      # trans noise from trans
    alpha4: 0.1      # trans noise from rot

    # Particle filter
    min_particles:        500
    max_particles:        3000
    pf_err:               0.05
    pf_z:                 0.99
    update_min_d:         0.1   # m — skip update if moved less
    update_min_a:         0.1   # rad

    # Laser model
    laser_model_type:     likelihood_field
    laser_max_range:      12.0
    laser_min_range:      0.15
    max_beams:            60
    z_hit:                0.5
    z_rand:               0.5
    sigma_hit:            0.2
    likelihood_field_max_dist: 2.0

    # Recovery (kidnapping)
    recovery_alpha_slow:  0.001
    recovery_alpha_fast:  0.1

    # TF
    tf_broadcast:         true
    transform_tolerance:  1.0

    # Start pose — origin of your SLAM map
    set_initial_pose:     true
    initial_pose:
      x:   0.0
      y:   0.0
      z:   0.0
      yaw: 0.0

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart:    true
    node_names:   ["amcl"]